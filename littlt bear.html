<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>小熊聊天</title>
    <style>
        body {
            text-align: center;
            margin-top: 100px;
            font-size: 26px;
            font-family: "幼圆", sans-serif;
            background: #fff0f5;
            transition: all 0.5s;
        }
        h1 {
            color: #ff69b4;
        }
        button {
            font-size: 22px;
            padding: 16px 32px;
            margin: 20px;
            border-radius: 15px;
            border: none;
            background: #ffb6c1;
            cursor: pointer;
            font-family: "幼圆", sans-serif;
            color: white;
            transition: all 0.3s;
        }
        button:hover {
            background: #ff8da1;
            transform: scale(1.05);
        }
        /* 全屏结束提示样式 */
        .end-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(255, 240, 245, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: #ff69b4;
            z-index: 999;
            display: none; /* 默认隐藏 */
        }
    </style>
</head>
<body>
    <h1>今天开心吗？ʕ•ᴥ•ʔ 要和小熊聊天吗？</h1>
    <button id="yes">要</button>
    <button id="no">不要</button>

    <!-- 全屏结束提示 -->
    <div class="end-screen" id="endScreen">
        那快来吧，我在等你 🐻❤️
    </div>

    <script>
        let yesBtn = document.getElementById("yes");
        let noBtn = document.getElementById("no");
        let endScreen = document.getElementById("endScreen");

        let size = 22;
        let firstClickYes = false;
        let firstClickNo = false;

        // 点【要】
        yesBtn.onclick = function() {
            if (!firstClickYes) {
                alert("你要点不要");
                firstClickYes = true;
            } else {
                // 显示全屏结束画面
                endScreen.style.display = "flex";
                // 隐藏按钮和标题
                document.querySelector("h1").style.display = "none";
                yesBtn.style.display = "none";
                noBtn.style.display = "none";
            }
        };

        // 点【不要】
        noBtn.onclick = function() {
            if (!firstClickNo) {
                alert("你居然拒绝我！！！˃̣̣̥᷄⌓˂̣̣̥᷅");
                firstClickNo = true;
            }
            size += 6;
            yesBtn.style.fontSize = size + "px";
            yesBtn.style.padding = (size * 0.7) + "px " + (size * 1.5) + "px";
        };
    </script>
</body>
</html>
